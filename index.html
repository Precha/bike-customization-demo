<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giant Custom Paint Program</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    @font-face { font-family:'Open Sans'; src:url('fonts/OpenSans-Light.ttf') format('truetype'); font-weight:300; font-style:normal; }
    @font-face { font-family:'Open Sans'; src:url('fonts/OpenSans-Regular.ttf') format('truetype'); font-weight:400; font-style:normal; }
    @font-face { font-family:'Open Sans'; src:url('fonts/OpenSans-SemiBold.ttf') format('truetype'); font-weight:600; font-style:normal; }
    @font-face { font-family:'Open Sans'; src:url('fonts/OpenSans-Bold.ttf') format('truetype'); font-weight:700; font-style:normal; }
    @font-face { font-family:'Open Sans'; src:url('fonts/OpenSans-ExtraBold.ttf') format('truetype'); font-weight:800; font-style:normal; }

    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { height:100%; }
    body {
      font-family:'Open Sans','Helvetica Neue',sans-serif;
      -webkit-font-smoothing:antialiased;
      background:#C1C2C7;
      color:#111;
      display:flex;
      flex-direction:column;
    }

    /* NAV */
    .site-nav {
      height:80px;
      background:#BEBFC4;
      border-bottom:1px solid rgba(0,0,0,.08);
      box-shadow:0 2px 8px rgba(0,0,0,.06);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 20px;
      flex-shrink:0;
    }

    /* Nav brand lockup */
    .nav-brand-lockup { display:flex; align-items:center; gap:8px; white-space:nowrap; }
    .brand-maker-img { height:56px; width:auto; display:block; }
    .brand-by { font-size:9px; font-weight:500; color:rgba(0,0,0,.4); letter-spacing:.06em; }
    .brand-giant-img { height:14px; width:auto; display:block; }
    .brand-sep { font-size:10px; color:rgba(0,0,0,.25); line-height:1; }
    .brand-liv-img { height:11px; width:auto; display:block; }

    /* MAIN */
    main {
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px 20px;
    }

    .login-card {
      width:100%;
      max-width:400px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:32px;
    }

    .login-eyebrow {
      font-size:10px;
      font-weight:700;
      letter-spacing:.22em;
      color:rgba(0,0,0,.45);
      text-transform:uppercase;
      text-align:center;
    }

    .login-title {
      font-family:'Bebas Neue',sans-serif;
      font-size:48px;
      font-weight:400;
      letter-spacing:.04em;
      color:#111;
      text-align:center;
      line-height:1.05;
    }

    .login-form {
      width:100%;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .login-input {
      width:100%;
      padding:14px 18px;
      background:#fff;
      border:1.5px solid rgba(0,0,0,.15);
      border-radius:8px;
      color:#111;
      font-family:'Open Sans',sans-serif;
      font-size:15px;
      font-weight:400;
      outline:none;
      transition:border-color .2s;
      letter-spacing:.05em;
    }
    .login-input::placeholder { color:rgba(0,0,0,.3); letter-spacing:.05em; }
    .login-input:focus { border-color:rgb(6,3,141); }

    .login-btn {
      position:relative;
      overflow:hidden;
      width:100%;
      padding:15px 40px;
      background:rgb(6,3,141);
      color:#fff;
      border:2px solid rgb(6,3,141);
      border-radius:999px;
      font-family:'Open Sans',sans-serif;
      font-size:13px;
      font-weight:800;
      letter-spacing:.1em;
      text-transform:uppercase;
      cursor:pointer;
      z-index:0;
      transition:opacity .2s;
      margin-top:4px;
    }
    .login-btn:hover { opacity:.85; }

    .login-error {
      font-size:13px;
      font-weight:600;
      color:#ff5c5c;
      text-align:center;
      min-height:18px;
      letter-spacing:.02em;
    }
  </style>
</head>
<body>

  <nav class="site-nav">
    <div class="nav-brand-lockup">
      <img src="assets/Logo/logo_maker_studio.png" class="brand-maker-img" alt="Maker Studio">
      <span class="brand-by">by</span>
      <img src="images/giant-logo-h.svg" class="brand-giant-img" alt="Giant">
      <span class="brand-sep">×</span>
      <img src="assets/Logo/Liv_Logotype_black.png" class="brand-liv-img" alt="Liv">
    </div>
  </nav>

  <main>
    <div class="login-card">
      <p class="login-eyebrow">Giant Custom Paint Program</p>
      <h1 class="login-title">Enter Access Password</h1>
      <form class="login-form" id="loginForm">
        <input
          class="login-input"
          type="password"
          id="passwordInput"
          placeholder="Password"
          autocomplete="current-password"
          autofocus
        >
        <p class="login-error" id="errorMsg"></p>
        <button class="login-btn" type="submit">Enter</button>
      </form>
    </div>
  </main>

  <script>
    // SHA-256 hash of the access password
    // To update: run `echo -n "newpassword" | shasum -a 256` in Terminal
    // then replace the hash string below
    const PASSWORD_HASH = 'bc69402d24474e21c4f4bd81c843569075463990cea505ab7e31ff88e2326cc8';

    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    const params = new URLSearchParams(location.search);
    const redirect = params.get('redirect') || 'bike-customizer.html';

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const val = document.getElementById('passwordInput').value;
      const hash = await sha256(val);
      if (hash === PASSWORD_HASH) {
        sessionStorage.setItem('auth', '1');
        location.replace(redirect);
      } else {
        document.getElementById('errorMsg').textContent = 'Incorrect password. Please try again.';
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
      }
    });
  </script>

</body>
</html>
